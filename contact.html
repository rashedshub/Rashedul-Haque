<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Rashedul Haque</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Space+Grotesk:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--black:#0a0a0a;--white:#f4f2ee;--mid:#888;--border:#222;--accent:#c8a96e}
    body{background:var(--black);color:var(--white);font-family:'Space Grotesk',sans-serif;min-height:100vh}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.1rem 2.5rem;border-bottom:1px solid var(--border);background:rgba(10,10,10,0.92);backdrop-filter:blur(8px)}
    .nav-logo{font-family:'Space Mono',monospace;font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--white);text-decoration:none}
    .nav-back{font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--mid);text-decoration:none;transition:color 0.2s}
    .nav-back:hover{color:var(--accent)}
    .page-wrap{max-width:1100px;margin:0 auto;padding:8rem 2.5rem 5rem}
    .page-header{margin-bottom:3.5rem}
    .page-eyebrow{font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--accent);margin-bottom:0.8rem}
    .page-title{font-family:'Playfair Display',serif;font-size:clamp(2.5rem,5vw,4rem);font-weight:700;letter-spacing:-0.02em}
    .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border)}
    .contact-card{background:var(--black);padding:2.5rem;text-decoration:none;color:var(--white);transition:background 0.2s;display:block}
    .contact-card:hover{background:#111}
    .contact-card-label{font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:0.6rem}
    .contact-card-value{font-size:0.95rem;margin-bottom:0.3rem}
    .contact-card-sub{font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--mid);margin-top:0.4rem}
    footer{padding:2rem 2.5rem;border-top:1px solid var(--border);display:flex;justify-content:space-between}
    footer p{font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:0.1em;color:var(--mid);text-transform:uppercase}
    footer a{color:var(--mid);text-decoration:none}
    footer a:hover{color:var(--accent)}
    @media(max-width:700px){.contact-grid{grid-template-columns:1fr}.page-wrap{padding:7rem 1.5rem 3rem}}
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">Rashedul Haque</a>
    <a href="index.html" class="nav-back">← Back home</a>
  </nav>
  <div class="page-wrap">
    <div class="page-header">
      <div class="page-eyebrow">06 — Contact</div>
      <h1 class="page-title">Get in<br/><em style="font-style:italic;color:var(--accent)">Touch</em></h1>
    </div>
    <div class="contact-grid">
      <a href="mailto:rhaque.eee@gmail.com" class="contact-card">
        <div class="contact-card-label">Email</div>
        <div class="contact-card-value">rhaque.eee@gmail.com</div>
        <div class="contact-card-sub">Click to send an email →</div>
      </a>
      <a href="https://www.linkedin.com/in/rashedulhaque" target="_blank" class="contact-card">
        <div class="contact-card-label">LinkedIn</div>
        <div class="contact-card-value">linkedin.com/in/rashedulhaque</div>
        <div class="contact-card-sub">View profile →</div>
      </a>
      <a href="https://rxresu.me/rhaque.eee/resume-mdrashedul-haque-v3" target="_blank" class="contact-card">
        <div class="contact-card-label">Resume</div>
        <div class="contact-card-value">rxresu.me — Full Resume</div>
        <div class="contact-card-sub">View & download →</div>
      </a>
      <div class="contact-card">
        <div class="contact-card-label">Location</div>
        <div class="contact-card-value">Savar, Dhaka-1340</div>
        <div class="contact-card-sub">Bangladesh</div>
      </div>
    </div>
  </div>
  <footer><p>© 2025 Md. Rashedul Haque</p><p><a href="index.html">Home</a></p></footer>
</body>
</html>
