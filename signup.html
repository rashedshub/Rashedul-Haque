<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black:#0a0a0a; --white:#f5f5f5; --mid:#888; --border:#2a2a2a; --error:#ff4444; --success:#44cc88; }
    body { background:var(--black); color:var(--white); font-family:'Space Grotesk',sans-serif; min-height:100vh; display:grid; grid-template-columns:1fr 1fr; }
    .panel-left { border-right:1px solid var(--border); display:flex; flex-direction:column; justify-content:space-between; padding:3rem; position:relative; overflow:hidden; }
    .panel-left::before { content:''; position:absolute; inset:0; background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px); background-size:48px 48px; opacity:0.5; }
    .logo { font-family:'Space Mono',monospace; font-size:1rem; letter-spacing:0.1em; text-transform:uppercase; position:relative; text-decoration:none; color:var(--white); }
    .panel-left-content { position:relative; }
    .panel-left-content h2 { font-family:'Space Mono',monospace; font-size:clamp(2rem,4vw,3.5rem); font-weight:700; line-height:1.05; letter-spacing:-0.03em; margin-bottom:1.2rem; }
    .panel-left-content p { color:var(--mid); font-size:0.95rem; line-height:1.65; max-width:320px; }
    .panel-left-foot { font-family:'Space Mono',monospace; font-size:0.65rem; letter-spacing:0.12em; color:var(--mid); text-transform:uppercase; position:relative; }
    .panel-right { display:flex; align-items:center; justify-content:center; padding:3rem 2rem; }
    .form-wrap { width:100%; max-width:380px; }
    .form-header { margin-bottom:2.5rem; }
    .form-header .eyebrow { font-family:'Space Mono',monospace; font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--mid); margin-bottom:0.6rem; }
    .form-header h1 { font-size:1.8rem; font-weight:700; letter-spacing:-0.02em; }
    .field { margin-bottom:1.25rem; }
    label { display:block; font-family:'Space Mono',monospace; font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--mid); margin-bottom:0.5rem; }
    input[type="text"], input[type="email"], input[type="password"] { width:100%; background:transparent; border:1px solid var(--border); color:var(--white); font-family:'Space Grotesk',sans-serif; font-size:0.95rem; padding:0.75rem 1rem; outline:none; transition:border-color 0.2s; appearance:none; border-radius:0; }
    input:focus { border-color:var(--white); }
    input.error { border-color:var(--error); }
    input::placeholder { color:#444; }
    .row-2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .err-msg { font-family:'Space Mono',monospace; font-size:0.6rem; color:var(--error); margin-top:0.4rem; display:none; }
    .global-msg { font-family:'Space Mono',monospace; font-size:0.7rem; padding:0.75rem 1rem; margin-bottom:1rem; display:none; border:1px solid; line-height:1.5; }
    .global-msg.error { color:var(--error); border-color:var(--error); }
    .global-msg.success { color:var(--success); border-color:var(--success); }
    .btn-submit { width:100%; margin-top:0.5rem; font-family:'Space Mono',monospace; font-size:0.75rem; letter-spacing:0.12em; text-transform:uppercase; padding:1rem; background:var(--white); color:var(--black); border:1px solid var(--white); cursor:pointer; transition:background 0.2s,color 0.2s,opacity 0.2s; }
    .btn-submit:hover:not(:disabled) { background:transparent; color:var(--white); }
    .btn-submit:disabled { opacity:0.4; cursor:not-allowed; }
    .divider-text { display:flex; align-items:center; gap:1rem; margin:1.5rem 0; color:var(--mid); font-size:0.75rem; }
    .divider-text::before, .divider-text::after { content:''; flex:1; height:1px; background:var(--border); }
    .foot-note { text-align:center; font-size:0.8rem; color:var(--mid); }
    .foot-note a { color:var(--white); text-decoration:none; border-bottom:1px solid var(--border); transition:border-color 0.2s; }
    .foot-note a:hover { border-color:var(--white); }
    @media (max-width:700px) { body { grid-template-columns:1fr; } .panel-left { display:none; } }
  </style>
</head>
<body>
  <div class="panel-left">
    <a href="index.html" class="logo">&#9632; YourBrand</a>
    <div class="panel-left-content">
      <h2>Join the<br/>waitlist.</h2>
      <p>Sign up and wait for admin approval before you can access the dashboard.</p>
    </div>
    <div class="panel-left-foot">© 2025 YourBrand — All rights reserved</div>
  </div>

  <div class="panel-right">
    <div class="form-wrap">
      <div class="form-header">
        <div class="eyebrow">Step 01 of 01</div>
        <h1>Create account</h1>
      </div>

      <div id="globalMsg" class="global-msg"></div>

      <div class="row-2">
        <div class="field">
          <label for="fname">First name</label>
          <input type="text" id="fname" placeholder="Ada" />
        </div>
        <div class="field">
          <label for="lname">Last name</label>
          <input type="text" id="lname" placeholder="Lovelace" />
        </div>
      </div>

      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="ada@example.com" />
        <div class="err-msg" id="emailErr"></div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min. 8 characters" />
        <div class="err-msg" id="passErr"></div>
      </div>

      <div class="field">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" placeholder="Repeat password" />
        <div class="err-msg" id="confirmErr"></div>
      </div>

      <button class="btn-submit" id="submitBtn">Create account →</button>

      <div class="divider-text">or</div>

      <div class="foot-note">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp }                          from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile, sendEmailVerification }
                                                      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp }
                                                      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const app = initializeApp({
      apiKey: "AIzaSyCsu3StTX9q3hNk-kOK7Rz89tI-2P3OXgw",
      authDomain: "i-rashedulhaque.firebaseapp.com",
      projectId: "i-rashedulhaque",
      storageBucket: "i-rashedulhaque.firebasestorage.app",
      messagingSenderId: "456423753760",
      appId: "1:456423753760:web:36a39da05cd1be62885445"
    });
    const auth = getAuth(app);
    const db   = getFirestore(app);

    const btn = document.getElementById('submitBtn');

    function showErr(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }
    function showGlobal(msg, type) {
      const el = document.getElementById('globalMsg');
      el.textContent = msg;
      el.className = 'global-msg ' + type;
      el.style.display = 'block';
    }
    function clearErrors() {
      ['emailErr','passErr','confirmErr'].forEach(id => showErr(id, ''));
      ['email','password','confirm'].forEach(id => document.getElementById(id).classList.remove('error'));
      document.getElementById('globalMsg').style.display = 'none';
    }

    btn.addEventListener('click', async () => {
      clearErrors();
      const fname    = document.getElementById('fname').value.trim();
      const lname    = document.getElementById('lname').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      let valid = true;

      if (!email) {
        showErr('emailErr', 'Email is required.');
        document.getElementById('email').classList.add('error');
        valid = false;
      }
      if (password.length < 8) {
        showErr('passErr', 'Password must be at least 8 characters.');
        document.getElementById('password').classList.add('error');
        valid = false;
      }
      if (password !== confirm) {
        showErr('confirmErr', 'Passwords do not match.');
        document.getElementById('confirm').classList.add('error');
        valid = false;
      }
      if (!valid) return;

      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        // 1. Create Firebase Auth user
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        const user = cred.user;

        // 2. Set display name
        await updateProfile(user, { displayName: (fname + ' ' + lname).trim() });

        // 3. Save user doc to Firestore with status: pending
        await setDoc(doc(db, 'users', user.uid), {
          uid:       user.uid,
          email:     email,
          firstName: fname,
          lastName:  lname,
          role:      'user',
          status:    'pending',
          createdAt: serverTimestamp()
        });

        // 4. Send verification email
        await sendEmailVerification(user);

        showGlobal('Account created! Your request is pending admin approval. Check your email to verify your address.', 'success');
        btn.textContent = 'Done ✓';
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Create account →';
        const msgs = {
          'auth/email-already-in-use':   'This email is already registered.',
          'auth/invalid-email':          'Please enter a valid email address.',
          'auth/weak-password':          'Password is too weak.',
          'auth/network-request-failed': 'Network error. Check your connection.',
        };
        showGlobal(msgs[err.code] || ('Error: ' + err.message), 'error');
      }
    });
  </script>
</body>
</html>
