<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — User Approvals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black:#0a0a0a; --white:#f5f5f5; --mid:#888; --border:#2a2a2a; --error:#ff4444; --success:#44cc88; --warn:#f5a623; }

    body { background:var(--black); color:var(--white); font-family:'Space Grotesk',sans-serif; min-height:100vh; }

    /* top bar */
    .topbar { display:flex; align-items:center; justify-content:space-between; padding:1.2rem 2rem; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--black); z-index:10; }
    .logo { font-family:'Space Mono',monospace; font-size:0.85rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--white); text-decoration:none; }
    .admin-badge { font-family:'Space Mono',monospace; font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--warn); border:1px solid var(--warn); padding:0.3rem 0.7rem; }
    .btn-signout { font-family:'Space Mono',monospace; font-size:0.6rem; letter-spacing:0.12em; text-transform:uppercase; background:transparent; color:var(--mid); border:1px solid var(--border); padding:0.4rem 0.9rem; cursor:pointer; transition:color 0.2s,border-color 0.2s; }
    .btn-signout:hover { color:var(--white); border-color:var(--white); }

    /* gate / loading */
    #gate { display:flex; align-items:center; justify-content:center; min-height:80vh; }
    .gate-msg { text-align:center; }
    .gate-msg .label { font-family:'Space Mono',monospace; font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--mid); margin-bottom:0.6rem; }
    .gate-msg p { color:var(--mid); font-size:0.9rem; margin-bottom:1.2rem; }
    .btn-go { font-family:'Space Mono',monospace; font-size:0.7rem; letter-spacing:0.12em; text-transform:uppercase; padding:0.7rem 1.5rem; background:var(--white); color:var(--black); border:none; cursor:pointer; text-decoration:none; display:inline-block; }

    /* main content */
    #main { display:none; padding:2rem; max-width:1000px; margin:0 auto; }

    .page-header { margin-bottom:2rem; }
    .page-header .eyebrow { font-family:'Space Mono',monospace; font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--mid); margin-bottom:0.4rem; }
    .page-header h1 { font-size:1.8rem; font-weight:700; letter-spacing:-0.02em; }

    /* tabs */
    .tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:2rem; }
    .tab { font-family:'Space Mono',monospace; font-size:0.65rem; letter-spacing:0.12em; text-transform:uppercase; padding:0.7rem 1.4rem; background:transparent; color:var(--mid); border:none; border-bottom:2px solid transparent; cursor:pointer; transition:color 0.2s; margin-bottom:-1px; }
    .tab.active { color:var(--white); border-bottom-color:var(--white); }
    .tab:hover { color:var(--white); }

    /* stats row */
    .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-bottom:2rem; }
    .stat-card { border:1px solid var(--border); padding:1.2rem 1.5rem; }
    .stat-card .num { font-family:'Space Mono',monospace; font-size:2rem; font-weight:700; line-height:1; margin-bottom:0.3rem; }
    .stat-card .lbl { font-family:'Space Mono',monospace; font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--mid); }
    .stat-card.pending .num { color:var(--warn); }
    .stat-card.approved .num { color:var(--success); }

    /* user table */
    .user-list { display:flex; flex-direction:column; gap:0.75rem; }

    .user-card { border:1px solid var(--border); padding:1rem 1.25rem; display:grid; grid-template-columns:1fr auto; align-items:center; gap:1rem; transition:border-color 0.2s; }
    .user-card:hover { border-color:#444; }

    .user-info .name { font-weight:600; font-size:0.95rem; margin-bottom:0.2rem; }
    .user-info .email { font-family:'Space Mono',monospace; font-size:0.7rem; color:var(--mid); margin-bottom:0.4rem; }
    .user-info .meta { font-family:'Space Mono',monospace; font-size:0.6rem; color:#555; letter-spacing:0.05em; }

    .user-actions { display:flex; align-items:center; gap:0.6rem; flex-shrink:0; }

    .status-pill { font-family:'Space Mono',monospace; font-size:0.55rem; letter-spacing:0.12em; text-transform:uppercase; padding:0.25rem 0.6rem; border:1px solid; }
    .status-pill.pending  { color:var(--warn);    border-color:var(--warn); }
    .status-pill.approved { color:var(--success); border-color:var(--success); }
    .status-pill.rejected { color:var(--error);   border-color:var(--error); }

    .btn-approve { font-family:'Space Mono',monospace; font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; padding:0.45rem 1rem; background:var(--success); color:var(--black); border:none; cursor:pointer; transition:opacity 0.2s; }
    .btn-approve:hover { opacity:0.8; }
    .btn-approve:disabled { opacity:0.35; cursor:not-allowed; }

    .btn-reject { font-family:'Space Mono',monospace; font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; padding:0.45rem 1rem; background:transparent; color:var(--error); border:1px solid var(--error); cursor:pointer; transition:opacity 0.2s; }
    .btn-reject:hover { opacity:0.7; }
    .btn-reject:disabled { opacity:0.35; cursor:not-allowed; }

    .empty { font-family:'Space Mono',monospace; font-size:0.75rem; color:var(--mid); text-align:center; padding:3rem; border:1px solid var(--border); letter-spacing:0.1em; }

    .toast { position:fixed; bottom:2rem; right:2rem; font-family:'Space Mono',monospace; font-size:0.7rem; letter-spacing:0.08em; padding:0.75rem 1.2rem; border:1px solid; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:100; }
    .toast.show { opacity:1; }
    .toast.success { color:var(--success); border-color:var(--success); background:var(--black); }
    .toast.error   { color:var(--error);   border-color:var(--error);   background:var(--black); }

    @media (max-width:600px) {
      .stats { grid-template-columns:1fr 1fr; }
      .user-card { grid-template-columns:1fr; }
      .user-actions { justify-content:flex-start; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <a href="index.html" class="logo">&#9632; YourBrand</a>
    <div style="display:flex;align-items:center;gap:1rem;">
      <span class="admin-badge">Admin</span>
      <button class="btn-signout" id="signoutBtn">Sign out</button>
    </div>
  </div>

  <!-- Access gate (shown while checking or if not admin) -->
  <div id="gate">
    <div class="gate-msg">
      <div class="label">Checking access…</div>
      <p id="gateText">Please wait.</p>
    </div>
  </div>

  <!-- Main admin panel (shown only to admins) -->
  <div id="main">
    <div class="page-header">
      <div class="eyebrow">Admin Panel</div>
      <h1>User Approvals</h1>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="num" id="statTotal">—</div>
        <div class="lbl">Total Users</div>
      </div>
      <div class="stat-card pending">
        <div class="num" id="statPending">—</div>
        <div class="lbl">Pending</div>
      </div>
      <div class="stat-card approved">
        <div class="num" id="statApproved">—</div>
        <div class="lbl">Approved</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="pending">Pending</button>
      <button class="tab" data-tab="approved">Approved</button>
      <button class="tab" data-tab="all">All Users</button>
    </div>

    <div class="user-list" id="userList"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp }      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut }
                                  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, doc, getDoc, getDocs, updateDoc, orderBy, query }
                                  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const app  = initializeApp({
      apiKey: "AIzaSyCsu3StTX9q3hNk-kOK7Rz89tI-2P3OXgw",
      authDomain: "i-rashedulhaque.firebaseapp.com",
      projectId: "i-rashedulhaque",
      storageBucket: "i-rashedulhaque.firebasestorage.app",
      messagingSenderId: "456423753760",
      appId: "1:456423753760:web:36a39da05cd1be62885445"
    });
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let allUsers   = [];
    let activeTab  = 'pending';

    // ── Toast ──────────────────────────────────────────
    function toast(msg, type = 'success') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast ' + type + ' show';
      setTimeout(() => el.classList.remove('show'), 3000);
    }

    // ── Auth gate ──────────────────────────────────────
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        showGate('You must be signed in to access this page.', true);
        return;
      }
      // Check Firestore role
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (!snap.exists() || snap.data().role !== 'admin') {
        showGate('Access denied. You are not an admin.', true);
        return;
      }
      // Admin confirmed
      document.getElementById('gate').style.display = 'none';
      document.getElementById('main').style.display = 'block';
      loadUsers();
    });

    function showGate(msg, showBtn) {
      document.getElementById('gateText').textContent = msg;
      if (showBtn) {
        const btn = document.createElement('a');
        btn.href = 'login.html';
        btn.className = 'btn-go';
        btn.textContent = 'Go to login →';
        document.querySelector('.gate-msg').appendChild(btn);
      }
    }

    // ── Sign out ───────────────────────────────────────
    document.getElementById('signoutBtn').addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = 'login.html';
    });

    // ── Load users ─────────────────────────────────────
    async function loadUsers() {
      const q    = query(collection(db, 'users'), orderBy('createdAt', 'desc'));
      const snap = await getDocs(q);
      allUsers   = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      updateStats();
      renderList();
    }

    function updateStats() {
      document.getElementById('statTotal').textContent    = allUsers.length;
      document.getElementById('statPending').textContent  = allUsers.filter(u => u.status === 'pending').length;
      document.getElementById('statApproved').textContent = allUsers.filter(u => u.status === 'approved').length;
    }

    // ── Tabs ───────────────────────────────────────────
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        activeTab = tab.dataset.tab;
        renderList();
      });
    });

    // ── Render user list ───────────────────────────────
    function renderList() {
      const filtered = activeTab === 'all'
        ? allUsers
        : allUsers.filter(u => u.status === activeTab);

      const list = document.getElementById('userList');
      list.innerHTML = '';

      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty">No ${activeTab === 'all' ? '' : activeTab + ' '}users found.</div>`;
        return;
      }

      filtered.forEach(user => {
        const card = document.createElement('div');
        card.className = 'user-card';
        card.id = 'card-' + user.id;

        const joined = user.createdAt
          ? new Date(user.createdAt.seconds * 1000).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })
          : 'Unknown date';

        const isPending  = user.status === 'pending';
        const isApproved = user.status === 'approved';

        card.innerHTML = `
          <div class="user-info">
            <div class="name">${user.firstName || ''} ${user.lastName || ''}</div>
            <div class="email">${user.email}</div>
            <div class="meta">UID: ${user.id} &nbsp;·&nbsp; Joined: ${joined}</div>
          </div>
          <div class="user-actions">
            <span class="status-pill ${user.status}">${user.status}</span>
            ${isPending  ? `<button class="btn-approve" onclick="approveUser('${user.id}','${user.email}','${user.firstName}')">Approve</button>` : ''}
            ${isPending  ? `<button class="btn-reject"  onclick="rejectUser('${user.id}')">Reject</button>` : ''}
            ${isApproved ? `<button class="btn-reject"  onclick="rejectUser('${user.id}')">Revoke</button>` : ''}
          </div>
        `;
        list.appendChild(card);
      });
    }

    // ── Approve ────────────────────────────────────────
    window.approveUser = async (uid, email, firstName) => {
      const card = document.getElementById('card-' + uid);
      card.querySelectorAll('button').forEach(b => b.disabled = true);

      try {
        await updateDoc(doc(db, 'users', uid), { status: 'approved' });

        // Update local state
        const u = allUsers.find(u => u.id === uid);
        if (u) u.status = 'approved';
        updateStats();
        renderList();

        toast(`✓ ${firstName || email} approved.`, 'success');
      } catch (err) {
        toast('Failed to approve user.', 'error');
        card.querySelectorAll('button').forEach(b => b.disabled = false);
      }
    };

    // ── Reject / Revoke ────────────────────────────────
    window.rejectUser = async (uid) => {
      const card = document.getElementById('card-' + uid);
      card.querySelectorAll('button').forEach(b => b.disabled = true);

      try {
        await updateDoc(doc(db, 'users', uid), { status: 'rejected' });

        const u = allUsers.find(u => u.id === uid);
        if (u) u.status = 'rejected';
        updateStats();
        renderList();

        toast('User status set to rejected.', 'error');
      } catch (err) {
        toast('Failed to update user.', 'error');
        card.querySelectorAll('button').forEach(b => b.disabled = false);
      }
    };
  </script>

</body>
</html>
