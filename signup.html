<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #f5f5f5;
      --mid: #888;
      --border: #2a2a2a;
      --error: #ff4444;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* Left panel */
    .panel-left {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 3rem;
      position: relative;
      overflow: hidden;
    }

    .panel-left::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.5;
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      position: relative;
      text-decoration: none;
      color: var(--white);
    }

    .panel-left-content {
      position: relative;
    }

    .panel-left-content h2 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 1.2rem;
    }

    .panel-left-content p {
      color: var(--mid);
      font-size: 0.95rem;
      line-height: 1.65;
      max-width: 320px;
    }

    .panel-left-foot {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--mid);
      text-transform: uppercase;
      position: relative;
    }

    /* Right panel */
    .panel-right {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }

    .form-wrap {
      width: 100%;
      max-width: 380px;
    }

    .form-header {
      margin-bottom: 2.5rem;
    }

    .form-header .eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 0.6rem;
    }

    .form-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 0.5rem;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--white);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
      border-radius: 0;
    }

    input:focus { border-color: var(--white); }
    input::placeholder { color: #444; }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .btn-submit {
      width: 100%;
      margin-top: 0.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 1rem;
      background: var(--white);
      color: var(--black);
      border: 1px solid var(--white);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn-submit:hover { background: transparent; color: var(--white); }

    .divider-text {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: var(--mid);
      font-size: 0.75rem;
    }

    .divider-text::before,
    .divider-text::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .foot-note {
      text-align: center;
      font-size: 0.8rem;
      color: var(--mid);
    }

    .foot-note a {
      color: var(--white);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: border-color 0.2s;
    }

    .foot-note a:hover { border-color: var(--white); }

    @media (max-width: 700px) {
      body { grid-template-columns: 1fr; }
      .panel-left { display: none; }
    }
  </style>
</head>
<body>

  <div class="panel-left">
    <a href="index.html" class="logo">&#9632; YourBrand</a>

    <div class="panel-left-content">
      <h2>Join the<br/>waitlist.</h2>
      <p>Be among the first to access what we're building. No spam — just the launch date when it matters.</p>
    </div>

    <div class="panel-left-foot">© 2025 YourBrand — All rights reserved</div>
  </div>

  <div class="panel-right">
    <div class="form-wrap">
      <div class="form-header">
        <div class="eyebrow">Step 01 of 01</div>
        <h1>Create account</h1>
      </div>

      <div class="row-2">
        <div class="field">
          <label for="fname">First name</label>
          <input type="text" id="fname" placeholder="Ada" />
        </div>
        <div class="field">
          <label for="lname">Last name</label>
          <input type="text" id="lname" placeholder="Lovelace" />
        </div>
      </div>

      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="ada@example.com" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min. 8 characters" />
      </div>

      <div class="field">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" placeholder="Repeat password" />
      </div>

      <button class="btn-submit">Create account →</button>

      <div class="divider-text">or</div>

      <div class="foot-note">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

</body>
</html>
